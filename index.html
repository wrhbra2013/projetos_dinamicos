<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APOIA - Autores &amp; Pesquisadores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo" onclick="showView('dashboard')">
                    <span class="logo-icon">✍️</span>
                    <span class="logo-text" style="font-size:16px;">APOIA</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="dashboard" onclick="showView('dashboard')">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </button>
                <button class="nav-item" data-view="subjects" onclick="showView('subjects')">
                    <span class="nav-icon">📚</span>
                    <span class="nav-label">Projetos</span>
                </button>
                <button class="nav-item" data-view="summaries" onclick="showView('summaries')">
                    <span class="nav-icon">📝</span>
                    <span class="nav-label">Documentos</span>
                </button>
                <button class="nav-item" data-view="tests" onclick="showView('tests')">
                    <span class="nav-icon">📋</span>
                    <span class="nav-label">Revisões</span>
                </button>
                <button class="nav-item" data-view="results" onclick="showView('results')">
                    <span class="nav-icon">📈</span>
                    <span class="nav-label">Pareceres</span>
                </button>
            </nav>
            <div class="sidebar-footer" onclick="resetAll()" title="Resetar todos os dados">
                <span>🔄 Resetar Dados</span>
            </div>
        </aside>
        <main id="main-content"></main>
    </div>

    <div id="modal-overlay" class="hidden" onclick="closeModal()"></div>
    <div id="modal" class="hidden">
        <div class="modal-header">
            <h2 id="modal-title"></h2>
            <button class="btn-icon modal-close-btn" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

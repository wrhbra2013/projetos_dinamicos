<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voluntário - ONG Amor Animal Marília</title>
  <link rel="stylesheet" href="../static/css/default.css">
  <link rel="stylesheet" href="../static/css/icons/bootstrap-icons.min.css">
  <link rel="icon" type="image/png" href="../static/css/favicon/ong.ico">
  <link rel="stylesheet" href="../static/css/bootstrap/bootstrap.min.css">
  <style>
    .voluntario-header { background: var(--nav-gradient); color: white; padding: 40px 20px; border-radius: 12px; margin-bottom: 30px; text-align: center; }
    .voluntario-header h1 { font-size: 2em; margin-bottom: 10px; }
    .voluntario-header p { opacity: 0.9; font-size: 1.1em; }
    .form-section { background: var(--container-bg); border-radius: 12px; padding: 30px; box-shadow: var(--container-shadow); margin-bottom: 30px; }
    .btn-submit { background: var(--brand-teal); color: white; padding: 12px 40px; font-size: 1.1em; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .success-msg { display: none; text-align: center; padding: 40px; }
    .success-msg i { font-size: 4em; color: var(--brand-teal); margin-bottom: 20px; }
    .field-error { color: var(--brand-coral); font-size: 0.85em; margin-top: 5px; }
  </style>
</head>
<body>

<script>var ROOT='..';</script>
<script src="../components/header.js"></script>

<main class="container mt-4 mb-4">
  <div class="voluntario-header">
    <h1><i class="bi bi-people-fill me-2"></i>Seja Voluntário</h1>
    <p>Faça parte da nossa equipe e ajude a transformar vidas</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="form-section" id="formSection">
        <h3 class="mb-4"><i class="bi bi-pencil-square me-2"></i>Cadastro de Voluntário</h3>
        <form id="voluntarioForm" novalidate>
          <div class="mb-3">
            <label for="nome" class="form-label fw-bold">Nome:*</label>
            <input type="text" class="form-control" id="nome" name="nome" required>
          </div>
          <div class="mb-3">
            <label for="localidade" class="form-label fw-bold">Localidade (cidade/bairro):*</label>
            <input type="text" class="form-control" id="localidade" name="localidade" required>
          </div>
          <div class="row mb-3">
            <div class="col-md-6">
              <label for="telefone" class="form-label fw-bold">Telefone:*</label>
              <input type="tel" class="form-control" id="telefone" name="telefone" required>
            </div>
            <div class="col-md-6">
              <label for="whatsapp" class="form-label fw-bold">Disponível no WhatsApp?</label>
              <select class="form-select" id="whatsapp" name="whatsapp">
                <option value="" selected disabled>Selecione...</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label for="disponibilidade" class="form-label fw-bold">Disponibilidade:</label>
            <input type="text" class="form-control" id="disponibilidade" name="disponibilidade" placeholder="Ex: fins de semana, 4h por semana, etc">
          </div>
          <div class="mb-3">
            <label for="habilidade" class="form-label fw-bold">Habilidade / Área de Interesse:</label>
            <input type="text" class="form-control" id="habilidade" name="habilidade" placeholder="Ex: fotografia, veterinária, eventos, etc">
          </div>
          <div class="mb-3">
            <label for="mensagem" class="form-label fw-bold">Mensagem:</label>
            <textarea class="form-control" id="mensagem" name="mensagem" rows="3"></textarea>
          </div>
          <div class="text-center">
            <button type="submit" class="btn-submit"><i class="bi bi-send me-2"></i>Enviar Cadastro</button>
          </div>
        </form>
      </div>

      <div class="form-section success-msg" id="successSection">
        <i class="bi bi-check-circle-fill"></i>
        <h3>Cadastro Enviado com Sucesso!</h3>
        <p>Obrigado por se voluntariar! Entraremos em contato em breve.</p>
        <a href="../index.html" class="btn btn-primary mt-3">Voltar para Home</a>
      </div>
    </div>
  </div>
</main>

<script src="../components/footer.js"></script>
<script>
(function() {
  const API_BASE = 'https://api.projetosdinamicos.com.br/amoranimal';
  const form = document.getElementById('voluntarioForm');
  const formSection = document.getElementById('formSection');
  const successSection = document.getElementById('successSection');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const nome = document.getElementById('nome').value.trim();
    const localidade = document.getElementById('localidade').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    if (!nome || !localidade || !telefone) {
      alert('Preencha os campos obrigatórios (Nome, Localidade e Telefone).');
      return;
    }
    const btn = form.querySelector('.btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Enviando...';

    fetch(API_BASE + '/voluntarios', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nome: nome,
        localidade: localidade,
        telefone: telefone,
        whatsapp: document.getElementById('whatsapp').value || null,
        disponibilidade: document.getElementById('disponibilidade').value.trim() || null,
        habilidade: document.getElementById('habilidade').value.trim() || null,
        mensagem: document.getElementById('mensagem').value.trim() || null
      })
    })
    .then(function(r) {
      if (!r.ok) throw new Error('Erro ao enviar cadastro');
      return r.json();
    })
    .then(function() {
      formSection.style.display = 'none';
      successSection.style.display = 'block';
    })
    .catch(function(err) {
      alert('Erro ao enviar: ' + err.message);
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-send me-2"></i>Enviar Cadastro';
    });
  });
})();
</script>

</body>
</html>

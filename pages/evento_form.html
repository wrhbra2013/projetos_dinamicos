<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Evento - ONG Amor Animal Marília</title>
  <link rel="stylesheet" href="../static/css/default.css">
  <link rel="stylesheet" href="../static/css/icons/bootstrap-icons.min.css">
  <link rel="icon" type="image/png" href="../static/css/favicon/ong.ico">
</head>
<body>

<script>var ROOT='..';</script>
<script src="../components/header.js"></script>
<script src="../static/js/api.js"></script>

<div class="container mt-4 mb-4">
  <div class="page-header mb-3 text-center">
    <h1><i class="bi bi-calendar-plus"></i> Novo Evento</h1>
    <p class="lead">Cadastre um novo evento para divulgação no site.</p>
  </div>
</div>

<div class="container mt-5 mb-5">
  <div class="form-container card p-4 shadow-sm" style="max-width:600px;margin:0 auto;">
    <form id="form-evento">
      <div class="form-grid">
        <div class="form-group">
          <label for="titulo">Título <span class="text-danger">*</span></label>
          <input type="text" name="titulo" id="titulo" placeholder="Nome do Evento" required>
        </div>
        <div class="form-group">
          <label for="data">Data <span class="text-danger">*</span></label>
          <input type="date" name="data" id="data" required>
        </div>
        <div class="form-group">
          <label for="local">Local</label>
          <input type="text" name="local" id="local" placeholder="Local do evento">
        </div>
        <div class="form-group">
          <label for="descricao">Descrição</label>
          <textarea name="descricao" id="descricao" rows="4" placeholder="Descreva o evento..."></textarea>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label for="foto">Foto do Evento</label>
          <input type="file" id="foto" accept="image/*">
          <div id="preview-foto" style="margin-top:8px;display:none;">
            <img id="preview-img" style="max-width:200px;max-height:200px;border-radius:6px;border:1px solid var(--border-color);">
          </div>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2" style="display:flex;gap:1rem;justify-content:flex-end;">
        <a href="../index.html" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Criar Evento</button>
      </div>
    </form>
    <div id="msg-evento" style="display:none;margin-top:1rem;padding:1rem;border-radius:6px;text-align:center;"></div>
  </div>
</div>

<script>
var API_BASE = window.API_BASE;

document.getElementById('foto').addEventListener('change', function() {
  var file = this.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var preview = document.getElementById('preview-foto');
    var img = document.getElementById('preview-img');
    img.src = e.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

document.getElementById('form-evento').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = this.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status"></span> Salvando...';

  var fotoInput = document.getElementById('foto');
  var fotoBase64 = null;
  var reader = new FileReader();

  function enviar() {
    var body = {
      titulo: document.getElementById('titulo').value.trim(),
      data_evento: document.getElementById('data').value,
      local: document.getElementById('local').value.trim() || null,
      descricao: document.getElementById('descricao').value.trim() || null,
      fotos: fotoBase64 || null
    };

    fetch(API_BASE + '/eventos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(r) {
      if (!r.ok) throw new Error('Erro ao criar evento');
      return r.json();
    })
    .then(function() {
      document.getElementById('form-evento').style.display = 'none';
      document.getElementById('msg-evento').style.display = 'block';
      document.getElementById('msg-evento').className = 'success';
      document.getElementById('msg-evento').innerHTML = '<i class="bi bi-check-circle-fill" style="font-size:2rem;color:#22c55e;display:block;margin-bottom:8px;"></i><h4 style="color:#16a34a;">Evento criado com sucesso!</h4><p class="mt-3"><a href="../index.html" class="btn btn-primary">Voltar para Home</a></p>';
    })
    .catch(function(err) {
      alert('Erro ao criar evento: ' + err.message);
    })
    .finally(function() {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-plus-circle"></i> Criar Evento';
    });
  }

  if (fotoInput.files && fotoInput.files[0]) {
    reader.onload = function(ev) {
      fotoBase64 = ev.target.result;
      enviar();
    };
    reader.readAsDataURL(fotoInput.files[0]);
  } else {
    enviar();
  }
});
</script>
<script src="../components/footer.js"></script>

</body>
</html>

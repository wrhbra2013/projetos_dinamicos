<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transparência - ONG Amor Animal Marília</title>
  <link rel="stylesheet" href="../static/css/default.css">
  <link rel="stylesheet" href="../static/css/icons/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../static/css/transparencia_dashboard.css">
  <link rel="stylesheet" href="../static/css/transparencia_lista.css">
  <link rel="icon" type="image/png" href="../static/css/favicon/ong.ico">
  <style>
  .upload-section { max-width:600px; margin:30px auto; padding:1.5rem; border:1px solid var(--border-color); border-radius:8px; background:var(--container-bg); }
  .upload-section h3 { margin-top:0; }
  .upload-section label { display:block; margin-bottom:4px; font-size:0.85rem; font-weight:600; }
  .upload-section input, .upload-section select, .upload-section textarea { width:100%; padding:8px; border:1px solid var(--input-border); border-radius:6px; margin-bottom:1rem; box-sizing:border-box; }
  .upload-section textarea { resize:vertical; }
  .admin-toggle { text-align:center; margin:20px 0; }
  .admin-toggle a { color:var(--brand-teal); cursor:pointer; font-size:0.85rem; }
  #loading-docs { text-align:center; padding:3rem; color:var(--muted-color); }
  #loading-docs i { font-size:2rem; }
  .dashboard-card { cursor:pointer; }
  .back-link { margin-bottom:1rem; }
  .back-link a { color:var(--brand-teal); text-decoration:none; }
  .back-link a:hover { text-decoration:underline; }
  .form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:1rem; }
  .form-actions button, .form-actions a { padding:8px 24px; border-radius:6px; cursor:pointer; font-size:0.9rem; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
  .msg { display:none; padding:12px; border-radius:6px; text-align:center; margin-bottom:1rem; font-size:0.9rem; }
  .msg-success { background:#f0fdf4; border:1px solid #22c55e; color:#16a34a; }
  .msg-error { background:#fef2f2; border:1px solid #ef4444; color:#dc2626; }
  .hidden { display:none !important; }
  </style>
</head>
<body>

<script>var ROOT='..';</script>
<script src="../components/header.js"></script>

<div class="transparencia-container">

  <div id="dashboard-view">
    <h1>Portal da Transparência</h1>
    <p>Acesso aos documentos e relatórios da ONG Amor Animal.</p>

    <div class="admin-toggle">
      <a onclick="toggleAdmin()"><i class="bi bi-lock me-1"></i>Área Administrativa</a>
    </div>

    <div id="admin-section" class="hidden">
      <div class="admin-bar">
        <span><i class="bi bi-shield-lock"></i> Área Administrativa: </span>
        <a onclick="mostrarUpload()" style="cursor:pointer;"><i class="bi bi-upload"></i> Novo Documento</a>
      </div>
    </div>

    <div class="dashboard-grid" id="categorias-grid"></div>

    <div style="margin-top:30px;">
      <a href="../index.html" class="btn-voltar"><i class="bi bi-arrow-left"></i> Voltar para Home</a>
    </div>
  </div>

  <div id="lista-view" class="hidden">
    <div class="lista-container">
      <div class="header-flex">
        <h1 id="lista-titulo"></h1>
        <a onclick="voltarDashboard()" class="btn-voltar" style="cursor:pointer;"><i class="bi bi-arrow-left"></i> Voltar</a>
      </div>
      <div id="lista-conteudo"></div>
    </div>
  </div>

  <div id="upload-view" class="hidden">
    <div class="back-link">
      <a onclick="voltarDashboard()" style="cursor:pointer;"><i class="bi bi-arrow-left"></i> Voltar</a>
    </div>
    <div class="upload-section">
      <h3><i class="bi bi-upload me-2"></i>Publicar Documento</h3>

      <div id="upload-msg" class="msg"></div>

      <form id="form-upload" onsubmit="return enviarDocumento(event)">
        <label for="up-titulo">Título do Documento *</label>
        <input type="text" id="up-titulo" required>

        <label for="up-tipo">Categoria *</label>
        <select id="up-tipo" required>
          <option value="">Selecione...</option>
        </select>

        <label for="up-ano">Ano de Referência *</label>
        <input type="number" id="up-ano" required min="2000" max="2027">

        <label for="up-arquivo">Arquivo (PDF ou Imagem) *</label>
        <input type="file" id="up-arquivo" accept=".pdf,.jpg,.jpeg,.png" required>
        <small style="color:var(--muted-color);display:block;margin-top:-0.5rem;margin-bottom:1rem;font-size:0.8rem;">Formatos aceitos: PDF, JPG, PNG.</small>

        <label for="up-descricao">Descrição (Opcional)</label>
        <textarea id="up-descricao" rows="3"></textarea>

        <div class="form-actions">
          <a onclick="voltarDashboard()" style="background:white;border:1px solid var(--border-color);color:var(--text-color);">Cancelar</a>
          <button type="submit" style="background:var(--brand-teal);color:white;border:none;"><i class="bi bi-save me-1"></i> Publicar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="../components/footer.js"></script>
<script>
var API_BASE = 'https://api.projetosdinamicos.com.br/amoranimal';

var types = {
  'estatuto': 'Estatuto Social',
  'diretoria': 'Diretoria e Conselho Fiscal',
  'balanco': 'Balanços e Demonstrativo de Resultados',
  'financeiro': 'Relatórios Financeiros',
  'atividades': 'Relatório de Atividades',
  'colaboracao': 'Termos de Colaboração',
  'plano': 'Plano de Trabalho'
};

var icons = {
  'estatuto': 'bi-book',
  'diretoria': 'bi-people',
  'balanco': 'bi-bank',
  'financeiro': 'bi-file-earmark-text',
  'atividades': 'bi-list-check',
  'colaboracao': 'bi-briefcase',
  'plano': 'bi-clipboard-check'
};

(function init() {
  var grid = document.getElementById('categorias-grid');
  Object.keys(types).forEach(function(key) {
    var card = document.createElement('a');
    card.className = 'dashboard-card';
    card.style.cursor = 'pointer';
    card.onclick = function() { carregarLista(key); };
    card.innerHTML = '<i class="bi ' + (icons[key] || 'bi-file-text') + '"></i><h3>' + types[key] + '</h3>';
    grid.appendChild(card);
  });

  var select = document.getElementById('up-tipo');
  Object.keys(types).forEach(function(key) {
    var opt = document.createElement('option');
    opt.value = key;
    opt.textContent = types[key];
    select.appendChild(opt);
  });

  document.getElementById('up-ano').value = new Date().getFullYear();

  document.getElementById('up-arquivo').addEventListener('change', function() {
    var titulo = document.getElementById('up-titulo');
    if (this.files && this.files.length > 0 && !titulo.value) {
      titulo.value = this.files[0].name.replace(/\.[^/.]+$/, "");
    }
  });
})();

function toggleAdmin() {
  var section = document.getElementById('admin-section');
  section.classList.toggle('hidden');
}

function mostrarUpload() {
  document.getElementById('dashboard-view').classList.add('hidden');
  document.getElementById('lista-view').classList.add('hidden');
  document.getElementById('upload-view').classList.remove('hidden');
  document.getElementById('upload-msg').style.display = 'none';
}

function voltarDashboard() {
  document.getElementById('lista-view').classList.add('hidden');
  document.getElementById('upload-view').classList.add('hidden');
  document.getElementById('dashboard-view').classList.remove('hidden');
}

function carregarLista(tipo) {
  var titulo = types[tipo];
  if (!titulo) return;

  document.getElementById('dashboard-view').classList.add('hidden');
  document.getElementById('upload-view').classList.add('hidden');
  document.getElementById('lista-view').classList.remove('hidden');
  document.getElementById('lista-titulo').textContent = titulo;
  document.getElementById('lista-conteudo').innerHTML = '<div id="loading-docs"><i class="bi bi-hourglass-split"></i><p>Carregando documentos...</p></div>';

  fetch(API_BASE + '/transparencia')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var docs = Array.isArray(data) ? data.filter(function(d) { return d.tipo === tipo; }) : [];
      renderizarLista(docs, tipo);
    })
    .catch(function() {
      document.getElementById('lista-conteudo').innerHTML = '<div class="empty-msg">Erro ao carregar documentos. Tente novamente mais tarde.</div>';
    });
}

function renderizarLista(docs, tipo) {
  var container = document.getElementById('lista-conteudo');

  if (docs.length === 0) {
    container.innerHTML = '<div class="empty-msg">Nenhum documento encontrado nesta categoria.</div>';
    return;
  }

  docs.sort(function(a, b) { return (b.ano || 0) - (a.ano || 0); });

  var html = '';
  var currentYear = null;

  docs.forEach(function(doc) {
    if (doc.ano !== currentYear) {
      currentYear = doc.ano;
      html += '<h2 class="year-header"><i class="bi bi-calendar-event"></i> ' + (currentYear || 'Sem ano') + '</h2>';
    }

    var ext = doc.arquivo ? doc.arquivo.split('.').pop().toUpperCase() : 'N/A';
    var dataStr = doc.origem ? (function() {
      var d = new Date(doc.origem);
      return !isNaN(d.getTime()) ? d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' }) : (doc.ano || 'N/A');
    })() : (doc.ano || 'N/A');

    html += '<div class="doc-item">';
    html += '<div class="doc-info">';
    html += '<h3>' + (doc.titulo || 'Sem título') + '</h3>';
    html += '<div class="doc-meta">';
    html += '<div style="margin-bottom:6px;">';
    html += '<span class="badge"><i class="bi bi-file-earmark"></i> ' + ext + '</span>';
    html += '<span class="badge"><i class="bi bi-calendar-event"></i> ' + dataStr + '</span>';
    if (doc.tipo) html += '<span class="badge">' + (types[doc.tipo] || doc.tipo) + '</span>';
    html += '</div>';
    if (doc.descricao) html += '<p>' + doc.descricao + '</p>';
    html += '</div></div>';

    var arquivoUrl = API_BASE + '/uploads/transparencia/' + (doc.arquivo || '');
    html += '<div class="doc-actions">';
    html += '<a href="' + arquivoUrl + '" target="_blank" class="btn-view"><i class="bi bi-eye-fill"></i> Visualizar</a>';
    html += '<a href="' + arquivoUrl + '" download class="btn-view" style="background:var(--button-bg);color:var(--button-text);"><i class="bi bi-download"></i> Baixar</a>';

    var adminSection = document.getElementById('admin-section');
    if (!adminSection.classList.contains('hidden')) {
      html += '<button class="btn-delete" onclick="deletarDocumento(\'' + doc.id + '\',\'' + (doc.arquivo || '') + '\')"><i class="bi bi-trash-fill"></i> Excluir</button>';
    }

    html += '</div></div>';
  });

  container.innerHTML = html;
}

function deletarDocumento(id, arquivo) {
  if (!confirm('Tem certeza que deseja excluir este documento?')) return;

  fetch(API_BASE + '/transparencia/' + id + '/' + arquivo, { method: 'POST' })
    .then(function(r) {
      if (!r.ok) throw new Error('Erro');
      var tipo = document.getElementById('lista-titulo').textContent;
      var key = Object.keys(types).find(function(k) { return types[k] === tipo; });
      if (key) carregarLista(key);
    })
    .catch(function() {
      alert('Erro ao excluir documento.');
    });
}

function enviarDocumento(e) {
  e.preventDefault();

  var titulo = document.getElementById('up-titulo').value.trim();
  var tipo = document.getElementById('up-tipo').value;
  var ano = document.getElementById('up-ano').value;
  var descricao = document.getElementById('up-descricao').value.trim();
  var arquivoInput = document.getElementById('up-arquivo');
  var file = arquivoInput.files[0];

  if (!titulo || !tipo || !ano || !file) {
    mostrarMsg('Preencha todos os campos obrigatórios.', 'error');
    return false;
  }

  var btn = document.querySelector('#form-upload button[type="submit"]');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  var reader = new FileReader();
  reader.onload = function(ev) {
    var base64 = ev.target.result;

    fetch(API_BASE + '/transparencia', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        titulo: titulo,
        tipo: tipo,
        ano: parseInt(ano),
        descricao: descricao || null,
        arquivo_nome: file.name,
        arquivo_data: base64
      })
    })
    .then(function(r) { return r.json().then(function(d) { if (!r.ok) throw new Error(d.erro || 'Erro'); return d; }); })
    .then(function() {
      mostrarMsg('Documento publicado com sucesso!', 'success');
      document.getElementById('form-upload').reset();
      document.getElementById('up-ano').value = new Date().getFullYear();
    })
    .catch(function(err) {
      mostrarMsg('Erro ao publicar documento: ' + err.message, 'error');
    })
    .finally(function() {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-save me-1"></i> Publicar';
    });
  };
  reader.onerror = function() {
    mostrarMsg('Erro ao ler o arquivo.', 'error');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-save me-1"></i> Publicar';
  };
  reader.readAsDataURL(file);

  return false;
}

function mostrarMsg(texto, tipo) {
  var msg = document.getElementById('upload-msg');
  msg.textContent = texto;
  msg.className = 'msg msg-' + tipo;
  msg.style.display = 'block';
}
</script>

</body>
</html>

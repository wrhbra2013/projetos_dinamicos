<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coleta - ONG Amor Animal Marília</title>
  <link rel="stylesheet" href="../static/css/default.css">
  <link rel="stylesheet" href="../static/css/icons/bootstrap-icons.min.css">
  <link rel="icon" type="image/png" href="../static/css/favicon/ong.ico">
</head>
<body>

<script>var ROOT='..';</script>
<script src="../components/header.js"></script>
<script src="../static/js/api.js"></script>

<main class="container mt-4 mb-5">
  <nav style="margin-bottom:1rem;font-size:0.85rem;">
    <a href="doacao.html" style="color:var(--brand-teal);">Doação</a> &raquo;
    Coleta
  </nav>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header" style="background:var(--brand-teal);color:white;">
          <h1 class="h4 mb-0"><i class="bi bi-truck me-2"></i>Agendar Coleta</h1>
        </div>
        <div class="card-body">
          <form id="form-coleta">
            <div class="mb-3">
              <label for="nome" class="form-label">Nome *</label>
              <input type="text" name="nome" id="nome" class="form-control" placeholder="Nome completo" required>
            </div>

            <div class="mb-3">
              <label for="phone" class="form-label">Telefone *</label>
              <input type="tel" name="telefone" id="phone" class="form-control phone-input" placeholder="(00) 00000-0000" required>
            </div>

            <div class="mb-3">
              <label for="whatsapp" class="form-label">Disponível no WhatsApp?</label>
              <select name="whatsapp" id="whatsapp" class="form-select">
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="item" class="form-label">Item *</label>
              <select name="item" id="item" class="form-select" required onchange="mostrarOutroItem(this.value)">
                <option value="">Selecione</option>
                <option value="ração kg">Ração (Kg)</option>
                <option value="medicamento caixa">Medicamento (caixa)</option>
                <option value="acessório unidade">Acessório (unidade)</option>
                <option value="higiene unidade">Higiene (unidade)</option>
                <option value="outro">Outro</option>
              </select>
            </div>

            <div class="mb-3" id="outroItemDiv" style="display:none;">
              <label for="outro_item_descricao" class="form-label">Qual item?</label>
              <input type="text" name="outro_item_descricao" id="outro_item_descricao" class="form-control" placeholder="Descreva o item">
            </div>

            <div class="mb-3">
              <label for="quantidade" class="form-label">Quantidade</label>
              <input type="number" name="quantidade" id="quantidade" class="form-control" placeholder="Quantidade">
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="data" class="form-label">Melhor dia</label>
                <select name="data" id="data" class="form-select">
                  <option value="">Selecione</option>
                  <option value="segunda">Segunda-feira</option>
                  <option value="terca">Terça-feira</option>
                  <option value="quarta">Quarta-feira</option>
                  <option value="quinta">Quinta-feira</option>
                  <option value="sexta">Sexta-feira</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="hora" class="form-label">Melhor horário</label>
                <input type="time" name="hora" id="hora" class="form-control">
              </div>
            </div>

            <div class="mb-3">
              <label for="cep" class="form-label">CEP</label>
              <input type="text" name="cep" id="cep" class="form-control" placeholder="00000-000" maxlength="9" onblur="pesquisacep()">
            </div>

            <div class="mb-3">
              <label for="endereco" class="form-label">Endereço</label>
              <input type="text" name="endereco" id="endereco" class="form-control" placeholder="Rua, Avenida, etc.">
            </div>

            <div class="row mb-3">
              <div class="col-4">
                <label for="numero" class="form-label">Número</label>
                <input type="text" name="numero" id="numero" class="form-control" placeholder="Nº">
              </div>
              <div class="col-8">
                <label for="complemento" class="form-label">Complemento</label>
                <input type="text" name="complemento" id="complemento" class="form-control" placeholder="Complemento">
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="bairro" class="form-label">Bairro</label>
                <input type="text" name="bairro" id="bairro" class="form-control" placeholder="Bairro">
              </div>
              <div class="col-md-3">
                <label for="cidade" class="form-label">Cidade</label>
                <input type="text" name="cidade" id="cidade" class="form-control" placeholder="Cidade">
              </div>
              <div class="col-md-3">
                <label for="estado" class="form-label">Estado</label>
                <input type="text" name="estado" id="estado" class="form-control" placeholder="UF">
              </div>
            </div>

            <div class="mb-3">
              <label for="mensagem" class="form-label">Mensagem</label>
              <textarea name="mensagem" id="mensagem" class="form-control" rows="3" placeholder="Alguma observação?"></textarea>
            </div>

            <div class="text-center mt-4">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-send me-2"></i>Enviar
              </button>
            </div>
          </form>
          <div id="form-success" style="display:none;text-align:center;padding:2rem;">
            <i class="bi bi-check-circle" style="font-size:3rem;color:var(--brand-teal);"></i>
            <h3 class="mt-3">Solicitação enviada!</h3>
            <p>Entraremos em contato para confirmar a coleta.</p>
            <a href="doacao.html" class="btn btn-primary mt-3">Voltar</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="../components/footer.js"></script>
<script>
function mostrarOutroItem(val) {
  var div = document.getElementById('outroItemDiv');
  if (div) div.style.display = val === 'outro' ? 'block' : 'none';
}

function pesquisacep() {
  var cep = document.getElementById('cep').value.replace(/\D/g, '');
  if (cep.length !== 8) return;
  fetch('https://viacep.com.br/ws/' + cep + '/json/')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.erro) return;
      document.getElementById('endereco').value = d.logradouro || '';
      document.getElementById('bairro').value = d.bairro || '';
      document.getElementById('cidade').value = d.localidade || '';
      document.getElementById('estado').value = d.uf || '';
    })
    .catch(function() {});
}

document.getElementById('cep').addEventListener('input', function() {
  var v = this.value.replace(/\D/g, '');
  if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5);
  this.value = v;
});

document.getElementById('phone').addEventListener('input', function() {
  var v = this.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 6) v = '(' + v.slice(0, 2) + ') ' + v.slice(2, 7) + '-' + v.slice(7);
  else if (v.length > 2) v = '(' + v.slice(0, 2) + ') ' + v.slice(2);
  this.value = v;
});

document.getElementById('form-coleta').addEventListener('submit', function(e) {
  e.preventDefault();
  var data = {
    nome: document.getElementById('nome').value,
    telefone: document.getElementById('phone').value,
    whatsapp: document.getElementById('whatsapp').value,
    item: document.getElementById('item').value === 'outro'
      ? document.getElementById('outro_item_descricao').value
      : document.getElementById('item').value,
    quantidade: document.getElementById('quantidade').value,
    dia: document.getElementById('data').value,
    hora: document.getElementById('hora').value,
    cep: document.getElementById('cep').value,
    endereco: document.getElementById('endereco').value,
    numero: document.getElementById('numero').value,
    complemento: document.getElementById('complemento').value,
    bairro: document.getElementById('bairro').value,
    cidade: document.getElementById('cidade').value,
    estado: document.getElementById('estado').value,
    mensagem: document.getElementById('mensagem').value
  };
  fetch(window.API_BASE + '/coleta', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function() {
    document.getElementById('form-coleta').style.display = 'none';
    document.getElementById('form-success').style.display = 'block';
  })
  .catch(function(err) {
    alert('Erro ao enviar: ' + err.message);
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Atividades - Projetos Dinâmicos</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">PROJETOS<span>DINÂMICOS</span></a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="relatorio.html" class="nav-link active">Relatórios</a>
                <a href="relatorio_fluxograma.html" class="nav-link">Fluxograma</a>
                <button id="themeBtn" class="theme-btn" title="Alternar Tema">☀️</button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="page-header">
                <h2>Relatório Geral</h2>
                <div class="actions">
                    <button class="btn btn-primary" id="exportPdfBtn">
                        📄 Exportar PDF
                    </button>
                </div>
            </div>

            <section class="filters-card">
                <form id="formFiltros" class="form-grid">
                    <div class="form-group">
                        <label for="projeto_id">Projeto</label>
                        <select name="projeto_id" id="projeto_id">
                            <option value="">Todos</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="prioridade">Prioridade</label>
                        <select name="prioridade" id="prioridade">
                            <option value="">Todas</option>
                            <option value="Baixa">Baixa</option>
                            <option value="Média">Média</option>
                            <option value="Alta">Alta</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select name="status" id="status">
                            <option value="">Todos</option>
                            <option value="planejamento">Planejamento</option>
                            <option value="andamento">Andamento</option>
                            <option value="concluido">Concluído</option>
                        </select>
                    </div>

                    <div class="form-group" style="display: flex; align-items: flex-end; gap: 10px;">
                        <button type="submit" class="btn btn-secondary">Filtrar</button>
                        <button type="button" id="limparFiltros" class="btn btn-outline">Limpar</button>
                    </div>
                </form>
            </section>

            <div class="table-container">
                <table class="report-table">
                    <thead>
                        <tr>
                            <th>Projeto</th>
                            <th>Atividade</th>
                            <th>Stack</th>
                            <th>Data/Hora</th>
                            <th>Prioridade</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaRelatorio">
                    </tbody>
                </table>
            </div>

            <div class="summary">
                <p>Registros encontrados: <strong id="totalRegistros">0</strong></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Projetos Dinâmicos - Marília, SP</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
            
            const params = new URLSearchParams(window.location.search);
            const filtroProjeto = params.get('projeto_id') || '';
            const filtroPrioridade = params.get('prioridade') || '';
            const filtroStatus = params.get('status') || '';
            
            App.popularSelectProjetos();
            
            document.getElementById('projeto_id').value = filtroProjeto;
            document.getElementById('prioridade').value = filtroPrioridade;
            document.getElementById('status').value = filtroStatus;
            
            App.renderRelatorio();
            
            document.getElementById('formFiltros').addEventListener('submit', (e) => {
                e.preventDefault();
                const projeto_id = document.getElementById('projeto_id').value;
                const prioridade = document.getElementById('prioridade').value;
                const status = document.getElementById('status').value;
                
                let url = 'relatorio.html?';
                const params = [];
                if (projeto_id) params.push('projeto_id=' + projeto_id);
                if (prioridade) params.push('prioridade=' + prioridade);
                if (status) params.push('status=' + status);
                window.location.href = url + params.join('&');
            });
            
            document.getElementById('limparFiltros').addEventListener('click', () => {
                window.location.href = 'relatorio.html';
            });
            
            document.getElementById('exportPdfBtn').addEventListener('click', () => {
                App.gerarPDF();
            });
            
            const themeBtn = document.getElementById('themeBtn');
            themeBtn.addEventListener('click', () => {
                document.body.classList.toggle('light-theme');
                const isLight = document.body.classList.contains('light-theme');
                themeBtn.innerHTML = isLight ? '🌙' : '☀️';
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
            });
            
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-theme');
                themeBtn.innerHTML = '🌙';
            }
        });
    </script>
</body>
</html>

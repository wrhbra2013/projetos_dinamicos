<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ONG Amor Animal Marília</title>
  <link rel="stylesheet" href="../static/css/default.css">
  <link rel="stylesheet" href="../static/css/login.css">
  <link rel="stylesheet" href="../static/css/icons/bootstrap-icons.min.css">
  <link rel="shortcut icon" href="../static/css/imagem/ong.jpg" type="image/jpeg">
</head>
<body>

<div class="container">
    <a href="../index.html" class="btn btn-primary"><i class="bi bi-arrow-left"></i> Voltar para a página inicial</a>
</div>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h3 class="text-center" style="margin:0;">Acesso ao Sistema</h3>
        </div>
        <div class="card-body login-body">
            <form id="loginForm" autocomplete="off" novalidate>
                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuário:</label>
                    <input type="text" id="usuario" name="usuario" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha:</label>
                    <div style="position: relative;">
                        <input type="password" id="senha" name="senha" class="form-control" required style="padding-right: 40px;">
                        <span onclick="toggleSenha()" class="password-toggle"
                              style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none; z-index: 2;">&#x1F441;</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
                        <input type="checkbox" id="mostrarSenha"
                            onchange="document.getElementById('senha').type = this.checked ? 'text' : 'password'"
                            style="width: 18px; height: 18px; accent-color: var(--brand-teal); cursor: pointer;">
                        <label for="mostrarSenha" style="cursor: pointer; user-select: none; color: var(--text-color); font-size: 0.95em;">Mostrar Senha</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
            </form>
            <div id="messageContainer" style="margin-top:15px;"></div>
        </div>
        <div class="card-footer text-center">
            <p class="mb-0"></p>
        </div>
    </div>
</div>

<script src="../static/js/api.js"></script>
<script src="../static/js/login.js"></script>

</body>
</html>

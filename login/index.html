<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ONG Amor Animal Marília</title>
  <link rel="stylesheet" href="../static/css/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="../static/css/default.css">
  <link rel="stylesheet" href="../static/css/login.css">
  <link rel="stylesheet" href="../static/css/icons/bootstrap-icons.min.css">
  <link rel="shortcut icon" href="../static/css/imagem/ong.jpg" type="image/jpeg">
</head>
<body>

<div class="container mt-4">
  <a href="../index.html" class="btn btn-primary">Voltar para a página inicial</a>
</div>

<div class="container mt-4">
  <div class="row align-items-center">
    <div class="col-md-7">
      <div class="card">
        <h3 class="text-center mt-3">Acesso ao Sistema</h3>
        <div class="card-body login-body">
          <form id="loginForm" autocomplete="off" novalidate>
            <div class="mb-3">
              <label for="usuario" class="form-label">Usuário:</label>
              <input type="text" id="usuario" name="usuario" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="senha" class="form-label">Senha:</label>
              <div style="position: relative;">
                <input type="password" id="senha" name="senha" class="form-control" required style="padding-right: 40px;">
                <span onclick="toggleSenha()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none; z-index: 2;">👁</span>
              </div>
              <div class="form-check mt-2">
                <input type="checkbox" class="form-check-input" id="mostrarSenha" onchange="document.getElementById('senha').type = this.checked ? 'text' : 'password'">
                <label class="form-check-label" for="mostrarSenha">Mostrar Senha</label>
              </div>
            </div>
            <div>
              <button type="submit" class="btn btn-primary">Login</button>
            </div>
          </form>
          <div id="messageContainer" class="mt-3"></div>
        </div>
        <div class="card-footer text-center">
          <p class="mb-0">ONG Amor Animal Marília</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function toggleSenha() {
  const s = document.getElementById('senha');
  s.type = s.type === 'password' ? 'text' : 'password';
}
</script>

<script src="../static/js/login.js"></script>
<script>
const API_BASE = 'https://api.projetosdinamicos.com.br/amoranimal';

LoginFormHandler.prototype.setLoadingState = function(isLoading) {
  if (!this.submitButton) return;
  this.submitButton.disabled = isLoading;
  this.submitButton.classList.toggle('loading', isLoading);
  if (isLoading) {
    this.submitButton.innerHTML = '<span style="opacity:0;">Login</span>';
  } else {
    this.submitButton.innerHTML = 'Login';
  }
};

LoginFormHandler.prototype.handleSubmit = function(e) {
  e.preventDefault();
  const isUsuarioValid = this.validateField(this.usuarioInput);
  const isSenhaValid = this.validateField(this.senhaInput);
  if (!isUsuarioValid || !isSenhaValid) {
    this.showMessage('Por favor, preencha todos os campos corretamente.', 'danger');
    return;
  }
  this.setLoadingState(true);

  const email = this.usuarioInput.value.trim();
  const senha = this.senhaInput.value;

  fetch(API_BASE + '/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, senha })
  })
  .then(function(r) {
    if (!r.ok) {
      if (r.status === 401) throw new Error('Usuário ou senha inválidos.');
      throw new Error('Erro no servidor.');
    }
    return r.json();
  })
  .then(function(data) {
    localStorage.setItem('amoranimal_token', data.token);
    localStorage.setItem('amoranimal_usuario', JSON.stringify(data.usuario));
    window.loginHandler?.showMessage('Login realizado! Redirecionando...', 'success');
    setTimeout(function() { window.location.href = '/relatorio/index.html'; }, 1000);
  })
  .catch(function(err) {
    window.loginHandler?.showMessage(err.message, 'danger');
    window.loginHandler?.setLoadingState(false);
  });
};

document.addEventListener('DOMContentLoaded', function() {
  if (localStorage.getItem('amoranimal_token')) {
    window.location.href = '/relatorio/index.html';
  }
});
</script>

</body>
</html>

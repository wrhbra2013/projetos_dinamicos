<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fluxograma do Relatório</title>
  <link rel="stylesheet" href="static/css/style.css">
  <style>
    .container { max-width: 1100px; margin: 20px auto; padding: 10px; }
    .actions { margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Fluxograma do Relatório</h2>
    <div class="actions">
      <a href="relatorio.html">← Voltar ao relatório</a>
    </div>

    <div class="projects-summary" id="projectsSummary">
    </div>

    <div class="mermaid" id="mermaidChart">
    </div>
  </div>

  <script src="static/js/mermaid.min.js"></script>
  <script src="static/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        App.init();
        mermaid.initialize({ startOnLoad: false });
        App.renderFluxograma();
    });
  </script>
  <style>
    .projects-summary { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .project-card-sm { border:1px solid #ddd; padding:8px; border-radius:6px; width:240px; }
    .progress-bar { background:#eee; height:10px; border-radius:6px; overflow:hidden; margin:6px 0; }
    .progress-fill { background:linear-gradient(90deg,#4CAF50,#8BC34A); height:100%; }
  </style>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório de Castrações — Amor Animal Marília</title>
  <link rel="stylesheet" href="../static/css/default.css">
  <link rel="stylesheet" href="../static/css/relatorio.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .filters-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 24px;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted-color);
    }
    .filter-group input,
    .filter-group select {
      padding: 10px 14px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: var(--input-bg, #fff);
      color: var(--text-color);
      font-size: 0.95rem;
      min-width: 180px;
      transition: border-color 0.3s;
    }
    .filter-group input:focus,
    .filter-group select:focus {
      border-color: var(--brand-teal);
      outline: none;
    }
    .btn-filter {
      padding: 10px 24px;
      background: var(--brand-teal);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .btn-filter:hover {
      background: var(--brand-teal-dark, #0f766e);
      transform: translateY(-1px);
    }
    .btn-filter:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn-delete-selected {
      padding: 10px 20px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-delete-selected:hover {
      background: var(--danger-hover, #b91c1c);
      transform: translateY(-1px);
    }
    .btn-delete-selected:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      flex: 1;
      min-width: 140px;
      background: var(--container-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 16px 20px;
      text-align: center;
    }
    .stat-card .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--brand-teal);
    }
    .stat-card .stat-label {
      font-size: 0.8rem;
      color: var(--muted-color);
      margin-top: 4px;
    }
    .table-wrapper {
      overflow-x: auto;
      max-height: 600px;
      overflow-y: auto;
    }
    .table-wrapper table { min-width: 900px; }
    .checkbox-col { width: 40px; text-align: center; }
    .checkbox-col input { width: 18px; height: 18px; cursor: pointer; }
    .actions-col { width: 80px; text-align: center; }
    .loading-spinner {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .loading-spinner .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border-color);
      border-top-color: var(--brand-teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state i { font-size: 4em; margin-bottom: 20px; opacity: 0.5; }
    .empty-state h3 { margin-bottom: 10px; color: var(--text-color); }
    .badge-especie {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-gato { background: #e0f2fe; color: #0369a1; }
    .badge-cachorro { background: #fef3c7; color: #92400e; }
    .badge-status {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-agendado { background: #dbeafe; color: #1e40af; }
    .badge-realizado { background: #d1fae5; color: #065f46; }
    .badge-cancelado { background: #fee2e2; color: #991b1b; }
    @media (max-width: 768px) {
      .filters-bar { flex-direction: column; }
      .filter-group input, .filter-group select { min-width: 100%; }
      .stats-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="relatorio-container">
    <div class="page-header">
      <div>
        <h1><i class="bi bi-scissors me-2"></i>Relatório de Castrações</h1>
        <div class="subtitle">Painel administrativo — inscrições, filtros e exportação</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a href="index.html" class="btn-back-home">
          <i class="bi bi-bar-chart-steps"></i> Relatórios
        </a>
        <a href="../pages/castracao.html" class="btn-back-home">
          <i class="bi bi-arrow-left"></i> Castração
        </a>
      </div>
    </div>

    <div class="selector-section">
      <h2 class="mb-3"><i class="bi bi-funnel me-2"></i>Filtros</h2>

      <div class="filters-bar">
        <div class="filter-group">
          <label><i class="bi bi-calendar-start"></i> Data início</label>
          <input type="date" id="filter-data-inicio">
        </div>
        <div class="filter-group">
          <label><i class="bi bi-calendar-end"></i> Data fim</label>
          <input type="date" id="filter-data-fim">
        </div>
        <div class="filter-group">
          <label><i class="bi bi-paw"></i> Espécie</label>
          <select id="filter-especie">
            <option value="">Todas (padrão)</option>
            <option value="Gato">Exclusivo Gatos</option>
            <option value="Cachorro">Exclusivo Cachorros</option>
          </select>
        </div>
        <div class="filter-group">
          <label><i class="bi bi-tag"></i> Status</label>
          <select id="filter-status">
            <option value="">Todos</option>
            <option value="agendado">Agendado</option>
            <option value="realizado">Realizado</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>
        <div class="filter-group">
          <label><i class="bi bi-list-check"></i> Tipo</label>
          <select id="filter-tipo">
            <option value="">Todos</option>
            <option value="mutirao">Mutirão</option>
            <option value="baixo_custo">Baixo Custo</option>
            <option value="pets_rua">Pets de Rua</option>
          </select>
        </div>
        <div class="filter-group" style="align-self:flex-end;">
          <button class="btn-filter" onclick="carregarDados()">
            <i class="bi bi-search"></i> Gerar Relatório
          </button>
        </div>
      </div>
    </div>

    <div id="stats-section" class="stats-row" style="display:none;"></div>

    <div class="data-section" id="dataSection" style="display:none">
      <div class="section-header">
        <div>
          <h1 class="section-title"><i class="bi bi-table me-2"></i>Inscrições</h1>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <span class="badge-count" id="recordCount">0 registros</span>
        </div>
      </div>
      <div id="tableDataContainer">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>Carregando dados...</p>
        </div>
      </div>
      <div class="export-section" id="exportSection" style="display:none;">
        <button class="btn-delete-selected" id="btnDeleteSelected" onclick="excluirSelecionados()" disabled>
          <i class="bi bi-trash"></i> Excluir Selecionados
        </button>
        <button type="button" class="btn-export" style="background:var(--brand-teal);color:white" onclick="exportarCSV()">
          <i class="bi bi-file-earmark-spreadsheet"></i> Exportar CSV
        </button>
        <button type="button" class="btn-export btn-pdf" onclick="exportarPDF()">
          <i class="bi bi-file-earmark-pdf"></i> Gerar PDF
        </button>
      </div>
    </div>

    <div class="data-section" id="emptySection">
      <div class="empty-state">
        <i class="bi bi-inbox"></i>
        <h3>Nenhum Dado</h3>
        <p>Aplique os filtros e clique em "Gerar Relatório" para visualizar as inscrições.</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = (location.protocol === 'file:') ? 'https://api.projetosdinamicos.com.br/amoranimal' : '/amoranimal';

    let currentData = [];
    let selectedIds = new Set();

    function carregarDados() {
      const dataInicio = document.getElementById('filter-data-inicio').value;
      const dataFim = document.getElementById('filter-data-fim').value;
      const especie = document.getElementById('filter-especie').value;
      const status = document.getElementById('filter-status').value;
      const tipo = document.getElementById('filter-tipo').value;

      document.getElementById('emptySection').style.display = 'none';
      document.getElementById('dataSection').style.display = 'block';
      document.getElementById('exportSection').style.display = 'none';

      const container = document.getElementById('tableDataContainer');
      container.innerHTML = `
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>Carregando dados...</p>
        </div>
      `;

      let url = API_BASE + '/castracoes';
      const params = [];
      if (tipo) params.push('tipo=' + encodeURIComponent(tipo));
      if (status) params.push('status=' + encodeURIComponent(status));
      if (params.length) url += '?' + params.join('&');

      fetch(url)
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function(data) {
          var filtered = Array.isArray(data) ? data : [];

          if (especie) {
            filtered = filtered.filter(function(item) {
              return (item.pet_especie || '').toLowerCase() === especie.toLowerCase();
            });
          }

          if (dataInicio) {
            filtered = filtered.filter(function(item) {
              return item.data_agendamento && item.data_agendamento >= dataInicio;
            });
          }

          if (dataFim) {
            filtered = filtered.filter(function(item) {
              return item.data_agendamento && item.data_agendamento <= dataFim;
            });
          }

          if (status) {
            filtered = filtered.filter(function(item) {
              return (item.status || '').toLowerCase() === status.toLowerCase();
            });
          }

          currentData = filtered;
          selectedIds.clear();
          renderTabela(filtered);
          renderStats(filtered);
        })
        .catch(function(err) {
          container.innerHTML = `
            <div class="data-table-error">
              <i class="bi bi-exclamation-triangle"></i>
              <h4>Erro ao carregar dados</h4>
              <p>${err.message}</p>
              <p class="text-muted small">Verifique se a API está rodando em ${API_BASE}</p>
            </div>
          `;
        });
    }

    function renderStats(data) {
      var statsEl = document.getElementById('stats-section');
      if (!data.length) {
        statsEl.style.display = 'none';
        return;
      }
      var total = data.length;
      var gatos = data.filter(function(d) { return (d.pet_especie || '').toLowerCase() === 'gato'; }).length;
      var cachorros = data.filter(function(d) { return (d.pet_especie || '').toLowerCase() === 'cachorro'; }).length;
      var agendados = data.filter(function(d) { return (d.status || '').toLowerCase() === 'agendado'; }).length;
      var realizados = data.filter(function(d) { return (d.status || '').toLowerCase() === 'realizado'; }).length;
      var mutirao = data.filter(function(d) { return (d.tipo || '').toLowerCase() === 'mutirao'; }).length;

      statsEl.style.display = 'flex';
      statsEl.innerHTML =
        '<div class="stat-card"><div class="stat-value">' + total + '</div><div class="stat-label">Total</div></div>' +
        '<div class="stat-card"><div class="stat-value">' + gatos + '</div><div class="stat-label">Gatos</div></div>' +
        '<div class="stat-card"><div class="stat-value">' + cachorros + '</div><div class="stat-label">Cachorros</div></div>' +
        '<div class="stat-card"><div class="stat-value">' + agendados + '</div><div class="stat-label">Agendados</div></div>' +
        '<div class="stat-card"><div class="stat-value">' + realizados + '</div><div class="stat-label">Realizados</div></div>';
    }

    function renderTabela(data) {
      var container = document.getElementById('tableDataContainer');
      var countEl = document.getElementById('recordCount');

      if (!data || !data.length) {
        countEl.textContent = '0 registros';
        container.innerHTML = `
          <div class="empty-state">
            <i class="bi bi-inbox"></i>
            <h3>Nenhum Registro Encontrado</h3>
            <p>Tente alterar os filtros para encontrar resultados.</p>
          </div>
        `;
        document.getElementById('exportSection').style.display = 'none';
        return;
      }

      countEl.textContent = data.length + ' registros';
      selectedIds.clear();
      document.getElementById('btnDeleteSelected').disabled = true;

      var html = '<div class="table-wrapper"><table class="table-modern"><thead><tr>';
      html += '<th class="checkbox-col"><input type="checkbox" id="checkAll" onchange="toggleAll(event)"></th>';
      html += '<th>Ticket</th>';
      html += '<th>Responsável</th>';
      html += '<th>Pet</th>';
      html += '<th>Espécie</th>';
      html += '<th>Sexo</th>';
      html += '<th>Idade</th>';
      html += '<th>Clínica</th>';
      html += '<th>Data</th>';
      html += '<th>Tipo</th>';
      html += '<th>Status</th>';
      html += '<th class="actions-col">Ações</th>';
      html += '</tr></thead><tbody>';

      data.forEach(function(row) {
        var especieClass = (row.pet_especie || '').toLowerCase() === 'gato' ? 'badge-gato' : 'badge-cachorro';
        var statusClass = 'badge-' + ((row.status || '').toLowerCase() || 'agendado');

        html += '<tr id="row-' + row.id + '">';
        html += '<td class="checkbox-col"><input type="checkbox" value="' + row.id + '" onchange="onCheckChange(event)"></td>';
        html += '<td><strong>' + (row.ticket || '-') + '</strong></td>';
        html += '<td>' + (row.tutor_nome || '-') + '</td>';
        html += '<td><strong>' + (row.pet_nome || '-') + '</strong></td>';
        html += '<td><span class="badge-especie ' + especieClass + '">' + (row.pet_especie || '-') + '</span></td>';
        html += '<td>' + (row.pet_sexo || '-') + '</td>';
        html += '<td>' + (row.pet_idade || '-') + '</td>';
        html += '<td>' + (row.clinica || '-') + '</td>';
        html += '<td>' + (row.data_agendamento || '-') + '</td>';
        html += '<td><span style="text-transform:capitalize;">' + ((row.tipo || '').replace(/_/g, ' ') || '-') + '</span></td>';
        html += '<td><span class="badge-status ' + statusClass + '">' + (row.status || '-') + '</span></td>';
        html += '<td class="actions-col">';
        html += '<button class="btn-action btn-delete" title="Excluir" onclick="excluirRegistro(' + row.id + ')"><i class="bi bi-trash"></i></button>';
        html += '</td>';
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
      document.getElementById('exportSection').style.display = 'flex';
    }

    function toggleAll(event) {
      var checked = event.target.checked;
      document.querySelectorAll('#tableDataContainer tbody input[type="checkbox"]').forEach(function(cb) {
        cb.checked = checked;
        if (checked) selectedIds.add(parseInt(cb.value));
        else selectedIds.delete(parseInt(cb.value));
      });
      document.getElementById('btnDeleteSelected').disabled = selectedIds.size === 0;
    }

    function onCheckChange(event) {
      var id = parseInt(event.target.value);
      if (event.target.checked) selectedIds.add(id);
      else selectedIds.delete(id);
      document.getElementById('btnDeleteSelected').disabled = selectedIds.size === 0;
    }

    function excluirRegistro(id) {
      if (!confirm('Tem certeza que deseja excluir a inscrição #' + id + '?')) return;
      var btn = event && event.target ? event.target.closest('button') : null;
      if (btn) { btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass"></i>'; }

      fetch(API_BASE + '/castracoes/' + id, { method: 'DELETE' })
        .then(function(r) {
          if (!r.ok) throw new Error('Erro ao excluir');
          return r.json();
        })
        .then(function() {
          carregarDados();
        })
        .catch(function(err) {
          alert('Erro: ' + err.message);
          if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-trash"></i>'; }
        });
    }

    function excluirSelecionados() {
      if (selectedIds.size === 0) return;
      if (!confirm('Excluir ' + selectedIds.size + ' registro(s) selecionado(s)? Esta ação não pode ser desfeita.')) return;

      var btn = document.getElementById('btnDeleteSelected');
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass"></i> Excluindo...';

      var promises = [];
      selectedIds.forEach(function(id) {
        promises.push(
          fetch(API_BASE + '/castracoes/' + id, { method: 'DELETE' })
            .then(function(r) {
              if (!r.ok) throw new Error('Erro ao excluir #' + id);
              return r.json();
            })
        );
      });

      Promise.all(promises)
        .then(function() {
          carregarDados();
        })
        .catch(function(err) {
          alert('Erro ao excluir: ' + err.message);
          carregarDados();
        });
    }

    function exportarCSV() {
      if (!currentData.length) return;
      var columns = ['ticket', 'tutor_nome', 'tutor_telefone', 'pet_nome', 'pet_especie', 'pet_sexo', 'pet_idade', 'clinica', 'data_agendamento', 'tipo', 'status'];
      var labels = ['Ticket', 'Responsável', 'Contato', 'Pet', 'Espécie', 'Sexo', 'Idade', 'Clínica', 'Data', 'Tipo', 'Status'];

      var csv = labels.map(function(l) { return '"' + l + '"'; }).join(',') + '\n';
      currentData.forEach(function(row) {
        csv += columns.map(function(col) {
          var val = row[col];
          if (val === null || val === undefined) val = '';
          return '"' + String(val).replace(/"/g, '""') + '"';
        }).join(',') + '\n';
      });

      var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      var link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'relatorio_castracoes_' + new Date().toISOString().slice(0, 10) + '.csv';
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function exportarPDF() {
      if (!currentData.length) return;
      var win = window.open('', '_blank');
      if (!win) { alert('Permita pop-ups para gerar PDF.'); return; }

      var columns = ['ticket', 'tutor_nome', 'pet_nome', 'pet_especie', 'pet_sexo', 'pet_idade', 'clinica', 'data_agendamento', 'tipo', 'status'];
      var labels = ['Ticket', 'Responsável', 'Pet', 'Espécie', 'Sexo', 'Idade', 'Clínica', 'Data', 'Tipo', 'Status'];

      var params = new URLSearchParams(window.location.search);
      var tituloEvento = '';
      if (params.get('data') && params.get('local')) {
        tituloEvento = ' - ' + decodeURIComponent(params.get('local')) + ' (' + params.get('data') + ')';
      }

      var html = `
      <html><head><meta charset="utf-8"><title>Relatório de Castrações${tituloEvento}</title>
      <style>
        body { font-family: Arial, sans-serif; margin: 20px; font-size: 11px; }
        h1 { color: #0d9488; border-bottom: 2px solid #0d9488; padding-bottom: 10px; }
        h2 { color: #333; }
        .info { margin: 4px 0; color: #555; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th { background: #0d9488; color: white; padding: 6px; text-align: left; font-size: 10px; }
        td { padding: 5px 6px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background: #f8f9fa; }
        .footer { margin-top: 30px; font-size: 10px; color: #666; text-align: center; border-top: 1px solid #ddd; padding-top: 10px; }
      </style></head><body>
      <h1>ONG Amor Animal Marília</h1>
      <h2>Relatório de Castrações${tituloEvento}</h2>
      <p class="info">Gerado em: ${new Date().toLocaleString('pt-BR')}</p>
      <p class="info">Total de inscrições: ${currentData.length}</p>`;

      labels.forEach(function(l) { html += '<th>' + l + '</th>'; });
      html += '</tr></thead><tbody>';

      currentData.forEach(function(row) {
        html += '<tr>';
        columns.forEach(function(col) {
          var val = row[col];
          if (val === null || val === undefined) val = '-';
          html += '<td>' + String(val).substring(0, 80) + '</td>';
        });
        html += '</tr>';
      });

      html += `</tbody></table>
      <div class="footer">ONG Amor Animal Marília — https://amoranimal.ong.br</div>
      </body></html>`;

      win.document.write(html);
      win.document.close();
      win.print();
    }

    function converterDataBR(d) {
      if (!d) return '';
      var partes = d.split('/');
      if (partes.length === 3) {
        return partes[2] + '-' + partes[1] + '-' + partes[0];
      }
      return d;
    }

    document.addEventListener('DOMContentLoaded', function() {
      var token = localStorage.getItem('amoranimal_token');
      if (!token) {
        document.querySelector('.relatorio-container').innerHTML =
          '<div class="page-header"><div><h1><i class="bi bi-exclamation-triangle me-2"></i>Acesso Restrito</h1><div class="subtitle">Faça login como administrador para acessar esta página.</div></div></div>';
        return;
      }

      var params = new URLSearchParams(window.location.search);
      var dataParam = params.get('data');
      var localParam = params.get('local');

      if (dataParam) {
        var iso = converterDataBR(dataParam);
        document.getElementById('filter-data-inicio').value = iso;
        document.getElementById('filter-data-fim').value = iso;
        document.getElementById('filter-tipo').value = 'mutirao';

        if (localParam) {
          document.querySelector('.section-title').innerHTML =
            '<i class="bi bi-table me-2"></i>Inscrições — ' + decodeURIComponent(localParam) + ' (' + dataParam + ')';
        }

        carregarDados();
      }
    });
  </script>
</body>
</html>
